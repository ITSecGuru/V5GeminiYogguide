name: CI

on:
  pull_request:
    branches: [ dev, vercel, main ]
    paths-ignore:
      - '.devcontainer/**'
      - '.github/**'
  push:
    branches: [ dev, vercel, main ]
    paths-ignore:
      - '.devcontainer/**'
      - '.github/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm test --if-present
      - name: Build
        run: npm run build

