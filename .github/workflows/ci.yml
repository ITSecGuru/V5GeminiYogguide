name: CI

on:
  pull_request:
    branches: [ v7-transition-engine ]
    paths-ignore:
      - '.devcontainer/**'
      - '.github/**'
  push:
    branches: [ v7-transition-engine, feature/v8-data-validation-and-docs ]
    paths-ignore:
      - '.devcontainer/**'
      - '.github/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build
